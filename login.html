<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f7fb;
}

/* Splash */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#e3f2fd,#f1fff4);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s ease;
    z-index:999;
}

#splash img{
    width:140px;
}

.container{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    width:350px;
    padding:25px;
    border-radius:16px;
    text-align:center;
}

input{
    width:90%;
    padding:12px;
    margin:8px 0;
}

button{
    width:95%;
    padding:12px;
    background:#4a90e2;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- Splash -->
<div id="splash">
    <img src="https://cdn-icons-png.flaticon.com/512/3048/3048122.png">
    <h2>Welcome</h2>
</div>

<!-- Main -->
<div class="container" id="main">
    <div class="card">

        <h2>Login</h2>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <p id="result"></p>

    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxjQs2ujCOdp78runJQW8GJBOc5i0kloc",
  authDomain: "qaiazn.firebaseapp.com",
  projectId: "qaiazn",
  storageBucket: "qaiazn.firebasestorage.app",
  messagingSenderId: "944780637686",
  appId: "1:944780637686:web:5d30ca54a2bc76ec7b43d7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// إذا مسجل دخول → يروح مباشرة
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "index.html";
  }
});

window.login = async function () {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const result = document.getElementById("result");

  try {

    await signInWithEmailAndPassword(auth, email, password);

    setTimeout(() => {
      window.location.href = "index.html";
    }, 500);

  } catch (error) {
    result.innerText = error.message;
  }

};

// splash
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("main").style.display = "flex";
}, 2500);

</script>

</body>
</html>
