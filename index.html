<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
</head>
<body>

<h2>الصفحة الرئيسية</h2>

<p id="welcome"></p>

<label>اسم المسلسل</label><br>
<input type="text" id="seriesName"><br><br>

<label>الحلقة</label><br>
<select id="episode">
    <option value="">اختر الحلقة</option>
</select><br><br>

<label>الموسم</label><br>
<input type="number" id="season"><br><br>

<label>ملاحظات</label><br>
<textarea id="notes" maxlength="250" rows="5" cols="40"></textarea><br><br>

<button id="saveBtn">حفظ البيانات</button>
<button id="logoutBtn">تسجيل خروج</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxjQs2ujCOdp78runJQW8GJBOc5i0kloc",
  authDomain: "qaiazn.firebaseapp.com",
  projectId: "qaiazn",
  storageBucket: "qaiazn.firebasestorage.app",
  messagingSenderId: "944780637686",
  appId: "1:944780637686:web:5d30ca54a2bc76ec7b43d7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// تعبئة قائمة الحلقات من 1 إلى 100
const episodeSelect = document.getElementById("episode");

for (let i = 1; i <= 100; i++) {
  const option = document.createElement("option");
  option.value = i;
  option.textContent = i;
  episodeSelect.appendChild(option);
}

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  document.getElementById("welcome").innerText =
    "مرحباً " + (user.displayName || user.email);

  try {

    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {

      const data = docSnap.data();

      document.getElementById("seriesName").value =
        data.seriesName || "";

      document.getElementById("episode").value =
        data.episode || "";

      document.getElementById("season").value =
        data.season || "";

      document.getElementById("notes").value =
        data.notes || "";
    }

  } catch (error) {

    document.getElementById("status").innerText =
      error.message;

  }

});

document.getElementById("saveBtn")
.addEventListener("click", async () => {

  const seriesName =
    document.getElementById("seriesName").value.trim();

  const episode =
    document.getElementById("episode").value;

  const season =
    document.getElementById("season").value;

  const notes =
    document.getElementById("notes").value.trim();

  if (!seriesName) {
    document.getElementById("status").innerText =
      "يرجى إدخال اسم المسلسل";
    return;
  }

  if (!episode) {
    document.getElementById("status").innerText =
      "يرجى اختيار الحلقة";
    return;
  }

  if (!season) {
    document.getElementById("status").innerText =
      "يرجى إدخال الموسم";
    return;
  }

  try {

    await setDoc(doc(db, "users", currentUser.uid), {

      seriesName: seriesName,
      episode: episode,
      season: season,
      notes: notes

    });

    document.getElementById("status").innerText =
      "تم الحفظ بنجاح";

  } catch (error) {

    document.getElementById("status").innerText =
      error.message;

  }

});

document.getElementById("logoutBtn")
.addEventListener("click", async () => {

  await signOut(auth);

  window.location.href = "login.html";

});

</script>

</body>
</html>
