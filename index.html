
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questions</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:25px;
    border-radius:16px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.question{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#4a90e2;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

    <h2>Questions</h2>

    <div class="question">
        <label>1. كيف تشعر اليوم؟</label>
        <input type="text" id="q1">
    </div>

    <div class="question">
        <label>2. كيف كان نومك الليلة الماضية؟</label>
        <input type="text" id="q2">
    </div>

    <div class="question">
        <label>3. هل تشعر بضغط نفسي هذه الفترة؟</label>
        <input type="text" id="q3">
    </div>

    <div class="question">
        <label>4. هل لديك رغبة في التحدث مع أحد؟</label>
        <input type="text" id="q4">
    </div>

    <div class="question">
        <label>5. ما أكثر شعور يرافقك اليوم؟</label>
        <input type="text" id="q5">
    </div>

    <button onclick="save()">Save</button>

</div>

<script>

function save(){

    window.location.href = "next.html";

}

</script>

</body>
</html>
