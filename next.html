<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messages</title>

<style>
body{
    font-family: Arial;
    background:#f4f7fb;
    display:flex;
    justify-content:center;
}

.container{
    width:450px;
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:40px;
}

textarea,input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    background:#4a90e2;
    color:white;
    border:none;
    cursor:pointer;
}

.msg{
    padding:10px;
    background:#eee;
    margin-top:10px;
    border-radius:8px;
}

.admin-only{
    display:none;
    background:#dff0ff;
    padding:10px;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

    <h2>Messages</h2>

    <!-- رسالة المستخدم للمشرف -->
    <div id="userBox">
        <textarea id="userMsg" placeholder="ماذا تريد أن تقول؟"></textarea>
        <button onclick="sendUserMsg()">إرسال</button>
    </div>

    <!-- رسالة المشرف للجميع -->
    <div id="adminBox" class="admin-only">
        <textarea id="adminMsg" placeholder="رسالة للمستخدمين"></textarea>
        <button onclick="sendAdminMsg()">إرسال كمشرف</button>
    </div>

    <hr>

    <div id="messages"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    addDoc,
    deleteDoc,
    onSnapshot,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxjQs2ujCOdp78runJQW8GJBOc5i0kloc",
  authDomain: "qaiazn.firebaseapp.com",
  projectId: "qaiazn",
  storageBucket: "qaiazn.firebasestorage.app",
  messagingSenderId: "944780637686",
  appId: "1:944780637686:web:5d30ca54a2bc76ec7b43d7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let isAdmin = false;

const userBox = document.getElementById("userBox");
const adminBox = document.getElementById("adminBox");
const messagesDiv = document.getElementById("messages");

// التحقق من المستخدم + الدور
onAuthStateChanged(auth, async (user) => {

    if(!user){
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if(userSnap.exists() && userSnap.data().role === "admin"){
        isAdmin = true;
        adminBox.style.display = "block";
    }

    loadMessages();
});


// إرسال رسالة من المستخدم للمشرف
window.sendUserMsg = async function(){

    const text = document.getElementById("userMsg").value;

    if(!text) return;

    await addDoc(collection(db,"messages"),{
        text,
        from: currentUser.uid,
        type: "user",
        createdAt: serverTimestamp()
    });

    document.getElementById("userMsg").value = "";
    alert("تم إرسال الرسالة");
}


// إرسال رسالة من المشرف للجميع
window.sendAdminMsg = async function(){

    const text = document.getElementById("adminMsg").value;

    if(!text) return;

    await addDoc(collection(db,"messages"),{
        text,
        from: "admin",
        type: "admin",
        createdAt: serverTimestamp()
    });

    document.getElementById("adminMsg").value = "";
}


// عرض الرسائل
function loadMessages(){

    onSnapshot(collection(db,"messages"), (snap) => {

        messagesDiv.innerHTML = "";

        snap.forEach((docu) => {

            const data = docu.data();

            let div = document.createElement("div");
            div.classList.add("msg");

            div.innerHTML = `
                <p>${data.text}</p>
            `;

            // زر حذف للمشرف فقط
            if(isAdmin){
                let del = document.createElement("button");
                del.innerText = "حذف";
                del.style.background = "red";
                del.onclick = async () => {
                    await deleteDoc(doc(db,"messages",docu.id));
                };
                div.appendChild(del);
            }

            messagesDiv.appendChild(div);
        });
    });
}

</script>

</body>
</html>
