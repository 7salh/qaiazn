<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f7fb;
}

/* ===== Splash Screen ===== */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#e3f2fd,#f1fff4);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s ease;
    z-index:999;
}

#splash img{
    width:140px;
    animation: float 2s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}

#splash h2{
    margin-top:15px;
    color:#444;
    font-weight:normal;
}

/* ===== Container ===== */
.container{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
}

/* ===== Card ===== */
.card{
    background:white;
    width:350px;
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    text-align:center;
}

/* Title */
.card h2{
    margin-bottom:15px;
    color:#333;
}

/* Inputs */
input{
    width:90%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#6bbcff;
    box-shadow:0 0 5px rgba(107,188,255,0.4);
}

/* Button */
button{
    width:95%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#4a90e2;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#357fd8;
}

/* Login link */
a{
    display:block;
    margin-top:12px;
    color:#4a90e2;
    text-decoration:none;
}

/* Result text */
#result{
    margin-top:10px;
    color:#d9534f;
    font-size:14px;
}
</style>

</head>
<body>

<!-- ===== Splash Screen ===== -->
<div id="splash">
    <img src="https://cdn-icons-png.flaticon.com/512/3048/3048122.png" alt="yoga">
    <h2>Take a deep breath… and start your journey</h2>
</div>

<!-- ===== Main Page ===== -->
<div class="container" id="main">
    <div class="card">

        <h2>Create Account</h2>

        <input type="text" id="username" placeholder="Username"><br>
        <input type="text" id="phone" placeholder="05XXXXXXXX"><br>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <input type="password" id="confirmPassword" placeholder="Confirm Password"><br>

        <button onclick="signup()">Create Account</button>

        <p id="result"></p>

        <a href="login.html">Already have an account? Login</a>

    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxjQs2ujCOdp78runJQW8GJBOc5i0kloc",
  authDomain: "qaiazn.firebaseapp.com",
  projectId: "qaiazn",
  storageBucket: "qaiazn.firebasestorage.app",
  messagingSenderId: "944780637686",
  appId: "1:944780637686:web:5d30ca54a2bc76ec7b43d7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = async function () {

  const username = document.getElementById("username").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const result = document.getElementById("result");

  if (!username) {
    result.innerText = "Please enter username";
    return;
  }

  if (!/^05\d{8}$/.test(phone)) {
    result.innerText = "Phone must start with 05 and be 10 digits";
    return;
  }

  if (!email) {
    result.innerText = "Please enter email";
    return;
  }

  if (password.length < 6) {
    result.innerText = "Password must be at least 6 characters";
    return;
  }

  if (password !== confirmPassword) {
    result.innerText = "Passwords do not match";
    return;
  }

  try {

    const userCredential =
      await createUserWithEmailAndPassword(auth, email, password);

    await updateProfile(userCredential.user, {
      displayName: username
    });

    result.innerText = "Account created successfully";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1000);

  } catch (error) {
    result.innerText = error.message;
  }

};

/* ===== Splash control ===== */
setTimeout(()=>{
    document.getElementById("splash").style.opacity="0";

    setTimeout(()=>{
        document.getElementById("splash").style.display="none";
        document.getElementById("main").style.display="flex";
    },1000);

},2500);

</script>

</body>
</html>
